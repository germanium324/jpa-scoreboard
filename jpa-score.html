<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JPA Match App - Refined Flow</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0F4C3A; color: white; user-select: none; font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
    ::-webkit-scrollbar { display: none; }
    input[type=range] { -webkit-appearance: none; background: transparent; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #10B981; cursor: pointer; margin-top: -8px; box-shadow: 0 0 5px rgba(0,0,0,0.5); border: 2px solid white; }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #2A6552; border-radius: 2px; }
    .graph-line { stroke: #F472B6; stroke-width: 2; fill: none; stroke-linejoin: round; }
    .graph-point { fill: #F472B6; stroke: #0F4C3A; stroke-width: 1.5; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // =====================================================
    // Supabase 設定 - あなたのプロジェクトの値に置き換えてください
    // Supabase プロジェクト URL と anon key は
    // https://app.supabase.com のプロジェクト設定 > API で確認できます
    // =====================================================
    const SUPABASE_URL = 'https://zrplcxyedwfnqgciwttz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpycGxjeHllZHdmbnFnY2l3dHR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5Nzk3ODYsImV4cCI6MjA5NjU1NTc4Nn0.wafBOBExTXP_NVs4YDZiAN2lqqeo4SBOYIn6jknsngA';
    const isSupabaseConfigured =
      SUPABASE_URL !== 'YOUR_SUPABASE_PROJECT_URL' &&
      SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY';
    // =====================================================

    const _supabase = isSupabaseConfigured
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null;
    const EMPTY_USER_DATA = { matchHistory: [], playerDict: {} };

    // プレイヤー名を Supabase auth 用の合成メールアドレスに変換する
    const nameToEmail = (name) => {
      const bytes = new TextEncoder().encode(name.trim());
      let binary = '';
      bytes.forEach(b => { binary += String.fromCharCode(b); });
      const encoded = btoa(binary)
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
      return `u_${encoded}@jpa-scoreboard.app`;
    };

    const pinToPassword = (pin) => `jpa-pin-${pin}`;

    // --- 日時フォーマット関数 ---
    const formatTime = (ts) => {
      if (!ts) return '';
      const d = new Date(ts);
      return `${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
    };
    
    const formatDate = (ts) => {
      if (!ts) return '';
      const d = new Date(ts);
      return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;
    };

    // --- JPA SL to Goal Mapping ---
    const SL_GOALS = {
      1: 14, 2: 19, 3: 25, 4: 31, 5: 38,
      6: 46, 7: 55, 8: 65, 9: 75
    };

    // --- JPA チーム得点換算表ロジック ---
    const getTeamPoints = (loserSL, loserScore) => {
      const thresholds = {
        1: [2, 3, 4, 6, 7, 8, 10, 11, 13],
        2: [3, 5, 7, 8, 10, 12, 14, 16, 18],
        3: [4, 6, 9, 11, 14, 16, 19, 21, 24],
        4: [5, 8, 11, 14, 18, 21, 24, 27, 30],
        5: [6, 10, 14, 18, 22, 26, 29, 33, 37],
        6: [8, 12, 17, 22, 27, 31, 36, 40, 45],
        7: [10, 15, 21, 26, 32, 37, 43, 49, 54],
        8: [13, 19, 26, 32, 39, 45, 52, 58, 64],
        9: [17, 24, 31, 38, 46, 53, 60, 67, 74]
      };
      const limits = thresholds[loserSL] || thresholds[6];
      let loserPts = 8;
      for (let i = 0; i < limits.length; i++) {
        if (loserScore <= limits[i]) {
          loserPts = i;
          break;
        }
      }
      return { winner: 20 - loserPts, loser: loserPts };
    };

    // --- スタッツ計算ロジック ---
    const computeStats = (timeline, pKey) => {
      let pots = 0, misses = 0, safeties = 0, breaks = 0, nineBalls = 0, deads = 0;
      let maxRun = 0, currentRun = 0;

      timeline.forEach(inn => {
        inn[pKey].forEach(action => {
          if (action.type === 'break') breaks++;
          if (action.type === 'safety') { safeties++; currentRun = 0; }
          if (action.type === 'switch') { misses++; currentRun = 0; }
          if (action.type === 'pot') {
            pots++;
            if (action.ball === 9) nineBalls++;
            currentRun += (action.ball === 9 ? 2 : 1);
            if (currentRun > maxRun) maxRun = currentRun;
          }
          if (action.type === 'dead') { misses++; deads++; currentRun = 0; }
        });
      });
      
      const totalShots = pots + misses;
      const accuracy = totalShots === 0 ? 0 : Math.round((pots / totalShots) * 100);
      return { pots, misses, safeties, breaks, nineBalls, maxRun, accuracy, deads };
    };

    // --- 球のデザイン定義 ---
    const getBallColor = (num) => {
      const colors = {
        1: 'bg-yellow-400 text-white', 2: 'bg-blue-600 text-white', 3: 'bg-red-600 text-white',
        4: 'bg-purple-600 text-white', 5: 'bg-orange-500 text-white', 6: 'bg-green-600 text-white',
        7: 'bg-amber-800 text-white', 8: 'bg-gray-900 text-white', 9: 'bg-yellow-100 border-[3px] border-yellow-400 text-gray-900'
      };
      return colors[num];
    };

    const MiniBall = ({ num, isDead }) => (
      <div className={`w-4 h-4 rounded-full flex items-center justify-center text-[9px] font-bold relative ${getBallColor(num)} ${isDead ? 'opacity-40' : ''}`}>
        {num}
        {isDead && <span className="absolute -top-1 -right-1 text-red-500 text-[10px] font-black">×</span>}
      </div>
    );

    // ==========================================
    // ホーム画面
    // ==========================================
    const HomeScreen = ({ onNewMatch, onViewMatchData, onViewPersonalData, loggedInUser, onAuthSuccess, onLogout }) => {
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [authMode, setAuthMode] = useState('LOGIN'); // 'LOGIN' or 'REGISTER'
      const [authName, setAuthName] = useState('');
      const [authPin, setAuthPin] = useState('');
      const [isSubmitting, setIsSubmitting] = useState(false);

      const handleAuth = async () => {
        if (!authName.trim() || !/^\d{4}$/.test(authPin)) {
          alert('名前と4桁の数字パスワードを入力してください。');
          return;
        }

        setIsSubmitting(true);
        try {
          const email = nameToEmail(authName);
          const trimmedName = authName.trim();
          const password = pinToPassword(authPin);

          if (authMode === 'REGISTER') {
            const { data, error } = await _supabase.auth.signUp({
              email,
              password,
              options: { data: { display_name: trimmedName } }
            });
            if (error) {
              if (error.code === 'user_already_exists' || error.message.toLowerCase().includes('already registered')) {
                throw new Error('この名前は既に登録されています。');
              }
              throw new Error(error.message);
            }
            if (data.user && !data.session) {
              throw new Error('メール確認が必要です。Supabaseダッシュボードの Authentication > Settings でメール確認を無効にしてください。');
            }
            const { error: upsertError } = await _supabase
              .from('user_data')
              .upsert({ id: data.user.id, match_history: [], player_dict: {} });
            if (upsertError) {
              await _supabase.auth.signOut();
              throw new Error('ユーザーデータの作成に失敗しました。もう一度お試しください。');
            }
            onAuthSuccess({ name: trimmedName, data: EMPTY_USER_DATA });
            setShowAuthModal(false);
            alert('登録が完了し、ログインしました。');
          } else {
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) throw new Error('プレイヤー名またはパスワードが間違っています。');
            const { data: dbData } = await _supabase
              .from('user_data')
              .select('match_history, player_dict')
              .eq('id', data.user.id)
              .single();
            onAuthSuccess({
              name: trimmedName,
              data: {
                matchHistory: dbData?.match_history || [],
                playerDict: dbData?.player_dict || {}
              }
            });
            setShowAuthModal(false);
          }
        } catch (error) {
          alert(error.message);
        } finally {
          setIsSubmitting(false);
        }
      };

      const handleLogout = async () => {
        await onLogout();
        setShowAuthModal(false);
      };

      const handleProtectedData = (callback) => {
        if (!loggedInUser) {
          alert('左上のメニューからログインしてください。');
        } else {
          callback();
        }
      };

      return (
        <div className="flex flex-col h-screen max-w-md mx-auto bg-[#0F4C3A] relative items-center justify-center p-6">
          
          {/* 左上のハンバーガーメニュー */}
          <button 
            onClick={() => {
              setAuthName('');
              setAuthPin('');
              setShowAuthModal(true);
            }}
            className="absolute top-6 left-6 p-2 text-white active:scale-95 z-10"
          >
            <svg xmlns="http://www.w3.org/2000/svg" className="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>

          <div className="absolute top-1/4">
            <h1 className="text-4xl font-bold text-white tracking-widest text-center">JPAスコア記録</h1>
            {loggedInUser && <p className="text-center text-green-300 mt-2 text-sm">{loggedInUser} でログイン中</p>}
          </div>
          
          <div className="flex flex-col gap-6 mt-20">
            <button 
              onClick={onNewMatch}
              className="w-64 bg-[#1A6E4F] border border-white py-4 rounded-xl text-2xl font-bold flex items-center justify-center shadow-lg active:scale-95 transition-transform text-white"
            >
              新規試合
            </button>
            <button 
              onClick={() => handleProtectedData(onViewMatchData)}
              className="w-64 bg-[#2A6552] border border-white py-4 rounded-xl text-2xl font-bold flex items-center justify-center shadow-lg active:scale-95 transition-transform text-white"
            >
              対戦データ
            </button>
            <button 
              onClick={() => handleProtectedData(onViewPersonalData)}
              className="w-64 bg-[#1D5C45] border border-white py-4 rounded-xl text-2xl font-bold flex items-center justify-center shadow-lg active:scale-95 transition-transform text-white"
            >
              個人データ
            </button>
          </div>

          {/* 認証・登録モーダル */}
          {showAuthModal && (
            <div className="absolute inset-0 z-50 bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm">
              <div className="bg-white text-gray-800 rounded-2xl w-full p-6 shadow-2xl relative">
                
                {loggedInUser ? (
                  <div className="text-center">
                    <h2 className="text-xl font-bold mb-4">アカウント設定</h2>
                    <p className="mb-6">現在 <strong>{loggedInUser}</strong> でログインしています</p>
                    <div className="flex justify-around">
                      <button onClick={() => setShowAuthModal(false)} className="text-gray-500 font-medium px-4 py-2 border rounded">閉じる</button>
                      <button onClick={handleLogout} className="text-pink-500 font-medium px-4 py-2 border border-pink-500 rounded">ログアウト</button>
                    </div>
                  </div>
                ) : (
                  <div>
                    <div className="flex justify-center mb-4 border-b border-gray-200">
                      <button 
                        className={`flex-1 pb-2 font-bold ${authMode === 'LOGIN' ? 'text-green-600 border-b-2 border-green-600' : 'text-gray-400'}`}
                        onClick={() => setAuthMode('LOGIN')}
                      >
                        ログイン
                      </button>
                      <button 
                        className={`flex-1 pb-2 font-bold ${authMode === 'REGISTER' ? 'text-green-600 border-b-2 border-green-600' : 'text-gray-400'}`}
                        onClick={() => setAuthMode('REGISTER')}
                      >
                        新規登録
                      </button>
                    </div>
                    
                    <p className="text-xs text-gray-500 mb-4 text-center">
                      {authMode === 'LOGIN' ? '登録したプレイヤー名とパスワードを入力' : '新しいプレイヤー名とパスワードを登録'}
                    </p>
                    <div className="mb-4">
                      <label className="block text-sm font-medium text-gray-700 mb-1">プレイヤー名</label>
                      <input 
                        type="text" 
                        value={authName}
                        onChange={(e) => setAuthName(e.target.value)}
                        className="w-full border border-gray-300 rounded px-3 py-2 outline-none focus:border-green-500"
                        placeholder="名前を入力"
                      />
                    </div>
                    <div className="mb-6">
                      <label className="block text-sm font-medium text-gray-700 mb-1">パスワード（数字4桁）</label>
                      <input 
                        type="password" 
                        maxLength="4"
                        value={authPin}
                        onChange={(e) => setAuthPin(e.target.value.replace(/[^\d]/g, '').slice(0, 4))}
                        className="w-full border border-gray-300 rounded px-3 py-2 outline-none focus:border-green-500"
                        placeholder="1234"
                      />
                    </div>
                    <div className="flex justify-around">
                      <button onClick={() => setShowAuthModal(false)} className="text-gray-500 font-medium px-4 py-2">キャンセル</button>
                      <button onClick={handleAuth} disabled={isSubmitting} className={`text-green-600 font-medium px-4 py-2 border border-green-600 rounded ${isSubmitting ? 'opacity-50' : ''}`}>
                        {authMode === 'LOGIN' ? 'ログイン' : '登録'}
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    };

    // ==========================================
    // 対戦データ画面
    // ==========================================
    const HistoryScreen = ({ onBack, loggedInUser, matchHistory, onDeleteMatch }) => {
      const [historyData, setHistoryData] = useState([]);
      const [selectedMatch, setSelectedMatch] = useState(null);
      const [itemToDelete, setItemToDelete] = useState(null);
      
      const timerRef = useRef(null);
      const isLongPressRef = useRef(false);

      useEffect(() => {
        const filteredData = (matchHistory || []).filter(m => m.p1.name === loggedInUser || m.p2.name === loggedInUser);
        filteredData.sort((a, b) => b.startTime - a.startTime);
        setHistoryData(filteredData);
      }, [loggedInUser, matchHistory]);

      const handleTouchStart = (match) => {
        isLongPressRef.current = false;
        timerRef.current = setTimeout(() => {
          isLongPressRef.current = true;
          setItemToDelete(match);
        }, 600);
      };

      const handleTouchEnd = () => {
        if (timerRef.current) clearTimeout(timerRef.current);
      };

      const handleTouchMove = () => {
        if (timerRef.current) clearTimeout(timerRef.current);
      };

      const handleClick = (e, match) => {
        if (isLongPressRef.current) {
          e.preventDefault();
          return;
        }
        setSelectedMatch(match);
      };

      const handleDelete = async () => {
        if (itemToDelete) {
          const deleted = await onDeleteMatch(itemToDelete.startTime);
          if (!deleted) {
            alert('削除に失敗しました。');
            return;
          }
          setItemToDelete(null);
        }
      };

      const StatRow = ({ label, v1, v2 }) => (
        <div className="flex justify-between items-center text-sm py-[6px]">
          <span className="w-12 text-center font-bold text-gray-800">{v1}</span>
          <span className="flex-1 text-center text-gray-500 font-medium">{label}</span>
          <span className="w-12 text-center font-bold text-gray-800">{v2}</span>
        </div>
      );

      return (
        <div className="flex flex-col h-screen max-w-md mx-auto bg-[#0F4C3A] text-white relative overflow-hidden">
          
          {itemToDelete && (
            <div className="absolute inset-0 z-[60] bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm">
              <div className="bg-white text-gray-800 rounded-2xl w-full p-6 shadow-2xl relative text-center">
                <p className="text-lg font-bold mb-6">データを削除しますか？</p>
                <div className="flex justify-around">
                  <button onClick={() => setItemToDelete(null)} className="text-blue-500 font-medium px-4 py-2">キャンセル</button>
                  <button onClick={handleDelete} className="text-pink-500 font-medium px-4 py-2">削除</button>
                </div>
              </div>
            </div>
          )}

          {selectedMatch && !itemToDelete && (
            <div className="absolute inset-0 z-50 bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm">
              <div className="bg-white text-gray-800 rounded-3xl w-full p-6 shadow-2xl relative">
                <div className="flex justify-between text-xs text-gray-400 mb-2 px-2">
                  <span>{formatDate(selectedMatch.endTime || selectedMatch.startTime)}</span>
                  <span>{formatTime(selectedMatch.startTime)}-{selectedMatch.endTime ? formatTime(selectedMatch.endTime) : ''}</span>
                </div>
                
                <div className="flex justify-between items-center mb-2">
                  <div className="text-center flex-1">
                    <p className={`text-xl font-bold ${selectedMatch.winner === 1 ? 'text-pink-500' : 'text-gray-500'}`}>{selectedMatch.winner === 1 ? 'Win!' : 'Lose..'}</p>
                    <p className="text-sm text-gray-600 mt-1">{selectedMatch.p1.name} (SL:{selectedMatch.p1.sl})</p>
                    <p className="mt-1">
                      <span className="text-5xl font-normal text-gray-800">{selectedMatch.p1.score}</span>
                      <span className="text-lg text-gray-500 font-medium">/{selectedMatch.p1.goal}</span>
                    </p>
                  </div>
                  <div className="text-center flex-1">
                    <p className={`text-xl font-bold ${selectedMatch.winner === 2 ? 'text-pink-500' : 'text-gray-500'}`}>{selectedMatch.winner === 2 ? 'Win!' : 'Lose..'}</p>
                    <p className="text-sm text-gray-600 mt-1">{selectedMatch.p2.name} (SL:{selectedMatch.p2.sl})</p>
                    <p className="mt-1">
                      <span className="text-5xl font-normal text-gray-800">{selectedMatch.p2.score}</span>
                      <span className="text-lg text-gray-500 font-medium">/{selectedMatch.p2.goal}</span>
                    </p>
                  </div>
                </div>
                
                <p className="text-center text-lg font-medium text-gray-800">チーム得点: {selectedMatch.p1TeamPts}-{selectedMatch.p2TeamPts}</p>
                <p className="text-center text-sm font-medium text-gray-500 mb-4">イニング : {selectedMatch.inning}</p>
                
                <div className="border-t border-gray-200 py-3 space-y-1">
                  <StatRow label="セーフティー" v1={selectedMatch.p1Stats.safeties} v2={selectedMatch.p2Stats.safeties} />
                  <StatRow label="シュート精度" v1={`${selectedMatch.p1Stats.accuracy}%`} v2={`${selectedMatch.p2Stats.accuracy}%`} />
                  <StatRow label="ブレイク回数" v1={selectedMatch.p1Stats.breaks} v2={selectedMatch.p2Stats.breaks} />
                  <StatRow label="最大連続得点" v1={selectedMatch.p1Stats.maxRun} v2={selectedMatch.p2Stats.maxRun} />
                </div>
                
                <div className="flex justify-around mt-4 pt-2">
                  <button onClick={() => setSelectedMatch(null)} className="text-blue-500 font-medium text-lg px-8 py-2">閉じる</button>
                </div>
              </div>
            </div>
          )}

          <header className="flex items-center p-4 border-b border-[#2A6552]">
            <span className="text-xl mr-4 cursor-pointer" onClick={onBack}>&lt; 戻る</span>
            <h1 className="text-xl font-bold">対戦データ</h1>
          </header>
          
          <div className="flex-1 overflow-y-auto p-4 space-y-4">
            {historyData.length === 0 ? (
              <p className="text-center text-gray-400 mt-10">保存された試合データはありません。</p>
            ) : (
              historyData.map((match, idx) => (
                <div 
                  key={idx} 
                  onClick={(e) => handleClick(e, match)}
                  onTouchStart={() => handleTouchStart(match)}
                  onTouchEnd={handleTouchEnd}
                  onTouchMove={handleTouchMove}
                  onMouseDown={() => handleTouchStart(match)}
                  onMouseUp={handleTouchEnd}
                  onMouseLeave={handleTouchEnd}
                  className="bg-[#1D5C45] p-4 rounded-xl shadow-md border border-[#2A6552] cursor-pointer active:scale-[0.98] transition-transform"
                >
                  <div className="flex justify-between text-xs text-gray-300 mb-3 border-b border-[#2A6552] pb-2 pointer-events-none">
                    <span>{formatDate(match.startTime)}</span>
                    <span>{formatTime(match.startTime)} - {formatTime(match.endTime)}</span>
                  </div>
                  
                  <div className="flex justify-between items-center mb-2 pointer-events-none">
                    <div className={`text-center flex-1 ${match.winner === 1 ? 'text-pink-400 font-bold' : ''}`}>
                      <p className="text-xs truncate">{match.p1.name} (SL:{match.p1.sl})</p>
                      <p className="text-3xl mt-1">{match.p1.score}<span className="text-sm text-gray-400 font-normal">/{match.p1.goal}</span></p>
                    </div>
                    <div className="text-center px-2 text-sm text-gray-400">vs</div>
                    <div className={`text-center flex-1 ${match.winner === 2 ? 'text-pink-400 font-bold' : ''}`}>
                      <p className="text-xs truncate">{match.p2.name} (SL:{match.p2.sl})</p>
                      <p className="text-3xl mt-1">{match.p2.score}<span className="text-sm text-gray-400 font-normal">/{match.p2.goal}</span></p>
                    </div>
                  </div>
                  
                  <div className="text-center mt-3 pt-2 border-t border-[#2A6552] text-sm font-medium pointer-events-none">
                    チーム得点: {match.p1TeamPts} - {match.p2TeamPts}
                  </div>
                </div>
              ))
            )}
          </div>
        </div>
      );
    };

    // ==========================================
    // 個人データ画面
    // ==========================================
    const PersonalDataScreen = ({ onBack, loggedInUser, matchHistory }) => {
      const [stats, setStats] = useState({
        matches: 0,
        winRate: 0,
        accuracy: 0,
        maxRun: 0,
        masuwari: 0,
        graphData: []
      });

      useEffect(() => {
        const userMatches = (matchHistory || []).filter(m => m.p1.name === loggedInUser || m.p2.name === loggedInUser);
        
        if (userMatches.length === 0) {
          setStats({
            matches: 0,
            winRate: 0,
            accuracy: 0,
            maxRun: 0,
            masuwari: 0,
            graphData: []
          });
          return;
        }

        let totalWins = 0;
        let totalPots = 0;
        let totalShots = 0; // pots + misses + deads
        let overallMaxRun = 0;
        let masuwariCount = 0;
        
        const gData = [];

        userMatches.forEach(m => {
          const isP1 = m.p1.name === loggedInUser;
          const pKey = isP1 ? 'p1' : 'p2';
          const pStats = isP1 ? m.p1Stats : m.p2Stats;

          if ((isP1 && m.winner === 1) || (!isP1 && m.winner === 2)) totalWins++;
          
          totalPots += pStats.pots;
          totalShots += (pStats.pots + pStats.misses); // computeStats includes deads in misses
          
          if (pStats.maxRun > overallMaxRun) overallMaxRun = pStats.maxRun;

          // マスワリ判定
          m.timeline.forEach(inn => {
            const actions = inn[pKey];
            const hasBreak = actions.some(a => a.type === 'break');
            const pots = actions.filter(a => a.type === 'pot').length;
            const hasSwitch = actions.some(a => a.type === 'switch');
            const hasDead = actions.some(a => a.type === 'dead');
            const hasSafety = actions.some(a => a.type === 'safety');
            
            if (hasBreak && pots >= 9 && !hasSwitch && !hasDead && !hasSafety) {
              masuwariCount++;
            }
          });

          // グラフ用データ（得点 / イニング）
          const score = isP1 ? m.p1.score : m.p2.score;
          const innCount = Math.max(m.inning, 1);
          gData.push({
            date: m.startTime,
            dateLabel: formatDate(m.startTime).slice(5), // MM/DD
            ppi: score / innCount
          });
        });

        // グラフ用に時系列順に並び替え
        gData.sort((a, b) => a.date - b.date);

        setStats({
          matches: userMatches.length,
          winRate: Math.round((totalWins / userMatches.length) * 100),
          accuracy: totalShots === 0 ? 0 : Math.round((totalPots / totalShots) * 100),
          maxRun: overallMaxRun,
          masuwari: masuwariCount,
          graphData: gData
        });

      }, [loggedInUser, matchHistory]);

      const drawGraph = () => {
        if (stats.graphData.length === 0) return null;
        
        const gData = stats.graphData;
        const maxPPI = Math.max(...gData.map(d => d.ppi), 2); // 最小でも2を天井に
        const w = 100; // viewBox width 100%
        const h = 100; // viewBox height 100%
        
        let points = '';
        const xStep = gData.length > 1 ? w / (gData.length - 1) : w / 2;
        
        gData.forEach((d, i) => {
          const x = gData.length > 1 ? i * xStep : xStep;
          const y = h - (d.ppi / maxPPI) * h;
          points += `${x},${y} `;
        });

        return (
          <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full h-full overflow-visible py-2">
            <polyline points={points.trim()} className="graph-line" />
            {gData.map((d, i) => {
              const x = gData.length > 1 ? i * xStep : xStep;
              const y = h - (d.ppi / maxPPI) * h;
              return (
                <circle key={i} cx={x} cy={y} r="2" className="graph-point" />
              );
            })}
          </svg>
        );
      };

      const PStatRow = ({ label, value, unit }) => (
        <div className="flex justify-between items-center bg-[#1D5C45] p-4 rounded-xl border border-[#2A6552] mb-3">
          <span className="text-gray-300 font-medium">{label}</span>
          <span className="text-2xl font-bold">{value}<span className="text-sm font-normal text-gray-400 ml-1">{unit}</span></span>
        </div>
      );

      return (
        <div className="flex flex-col h-screen max-w-md mx-auto bg-[#0F4C3A] text-white relative overflow-hidden">
          <header className="flex items-center p-4 border-b border-[#2A6552]">
            <span className="text-xl mr-4 cursor-pointer" onClick={onBack}>&lt; 戻る</span>
            <h1 className="text-xl font-bold">個人データ</h1>
          </header>
          
          <div className="flex-1 overflow-y-auto p-4">
            <h2 className="text-center text-lg font-bold mb-4 text-green-300">{loggedInUser} の成績</h2>
            
            <PStatRow label="試合数" value={stats.matches} unit="試合" />
            <div className="flex gap-3 mb-3">
              <div className="flex-1 bg-[#1D5C45] p-4 rounded-xl border border-[#2A6552] text-center">
                <p className="text-xs text-gray-300 mb-1">勝率</p>
                <p className="text-xl font-bold">{stats.winRate}<span className="text-xs font-normal text-gray-400 ml-1">%</span></p>
              </div>
              <div className="flex-1 bg-[#1D5C45] p-4 rounded-xl border border-[#2A6552] text-center">
                <p className="text-xs text-gray-300 mb-1">シュート率</p>
                <p className="text-xl font-bold">{stats.accuracy}<span className="text-xs font-normal text-gray-400 ml-1">%</span></p>
              </div>
            </div>
            
            <div className="flex gap-3 mb-4">
              <div className="flex-1 bg-[#1D5C45] p-4 rounded-xl border border-[#2A6552] text-center">
                <p className="text-xs text-gray-300 mb-1">最大連続得点</p>
                <p className="text-xl font-bold text-pink-400">{stats.maxRun}</p>
              </div>
              <div className="flex-1 bg-[#1D5C45] p-4 rounded-xl border border-[#2A6552] text-center">
                <p className="text-xs text-gray-300 mb-1">マスワリ</p>
                <p className="text-xl font-bold text-pink-400">{stats.masuwari}</p>
              </div>
            </div>

            <div className="bg-[#1D5C45] rounded-xl border border-[#2A6552] p-4">
              <p className="text-sm text-gray-300 mb-2 font-medium">得点/イニング推移</p>
              <div className="w-full h-[25vh] relative pl-1 pr-1">
                {stats.graphData.length > 0 ? drawGraph() : (
                  <div className="flex items-center justify-center w-full h-full text-gray-500 text-sm">データがありません</div>
                )}
              </div>
              {/* X軸のラベル */}
              {stats.graphData.length > 0 && (
                <div className="flex justify-between mt-2 text-[10px] text-gray-400">
                  <span>{stats.graphData[0].dateLabel}</span>
                  {stats.graphData.length > 1 && <span>{stats.graphData[stats.graphData.length - 1].dateLabel}</span>}
                </div>
              )}
            </div>

          </div>
        </div>
      );
    };

    // ==========================================
    // セットアップ画面
    // ==========================================
    const SetupScreen = ({ onStart, onBack, playerDict }) => {
      const [p1, setP1] = useState({ name: 'プレイヤー1', sl: 6 });
      const [p2, setP2] = useState({ name: 'プレイヤー2', sl: 4 });
      const safePlayerDict = playerDict || {};
      
      const [showDropdown1, setShowDropdown1] = useState(false);
      const [showDropdown2, setShowDropdown2] = useState(false);

      const handleSelectPlayer = (playerNum, name) => {
        if (playerNum === 1) {

          setShowDropdown1(false);
        } else {

      };

      const SearchIcon = () => (
        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      );

      return (
        <div className="flex flex-col h-screen max-w-md mx-auto bg-[#0F4C3A] p-6 relative">
          <header className="flex items-center mb-8 pb-4 border-b border-[#2A6552]">
            <span className="text-xl mr-4 cursor-pointer" onClick={onBack}>&lt; 戻る</span>
            <h1 className="text-xl font-bold">Player info</h1>
          </header>

          <div className="mb-8">
            <h2 className="text-2xl font-bold mb-4">Player1</h2>
            
            <div className="flex items-center mb-4 relative">
              <label className="w-24 text-lg">Name:</label>
              <div className="flex-1 flex items-center bg-transparent border border-gray-400 rounded focus-within:border-green-400">
                <input 
                  type="text" 
                  value={p1.name} 
                  onChange={e => setP1({...p1, name: e.target.value})} 
                  className="flex-1 bg-transparent px-2 py-1 outline-none text-white w-full" 
                />
                <button 
                  onClick={() => setShowDropdown1(!showDropdown1)}
                  className="p-1 pr-2 active:scale-95"
                >
                  <SearchIcon />
                </button>
              </div>
              
              {showDropdown1 && Object.keys(safePlayerDict).length > 0 && (
                <ul className="absolute top-full left-24 right-0 mt-1 bg-[#1D5C45] border border-[#2A6552] rounded shadow-xl z-50 max-h-40 overflow-y-auto">
                  {Object.keys(safePlayerDict).map((name, i) => (
                    <li 
                      key={i} 
                      onClick={() => handleSelectPlayer(1, name)}
                      className="px-3 py-2 border-b border-[#2A6552] last:border-b-0 active:bg-[#2A6552] cursor-pointer text-sm"
                    >
                      {name} <span className="text-gray-400 ml-2">SL:{safePlayerDict[name]}</span>
                    </li>
                  ))}
                </ul>
              )}
            </div>

            <div className="flex items-center mb-4">
              <label className="w-24 text-lg">Skill level:</label>
              <input type="range" min="1" max="9" value={p1.sl} onChange={e => setP1({...p1, sl: parseInt(e.target.value)})} className="flex-1" />
              <span className="ml-4 w-6 h-6 rounded-full bg-green-600 flex items-center justify-center font-bold text-sm border border-white">{p1.sl}</span>
            </div>
            <div className="flex items-center">
              <label className="w-24 text-lg">Race to:</label>
              <div className="flex-1 bg-[#1D5C45] border border-gray-500 rounded px-2 py-1 text-gray-200">
                {SL_GOALS[p1.sl]}
              </div>
            </div>
          </div>

          <div className="mb-12">
            <h2 className="text-2xl font-bold mb-4">Player2</h2>
            
            <div className="flex items-center mb-4 relative">
              <label className="w-24 text-lg">Name:</label>
              <div className="flex-1 flex items-center bg-transparent border border-gray-400 rounded focus-within:border-pink-400">
                <input 
                  type="text" 
                  value={p2.name} 
                  onChange={e => setP2({...p2, name: e.target.value})} 
                  className="flex-1 bg-transparent px-2 py-1 outline-none text-white w-full" 
                />
                <button 
                  onClick={() => setShowDropdown2(!showDropdown2)}
                  className="p-1 pr-2 active:scale-95"
                >
                  <SearchIcon />
                </button>
              </div>
              
              {showDropdown2 && Object.keys(safePlayerDict).length > 0 && (
                <ul className="absolute top-full left-24 right-0 mt-1 bg-[#1D5C45] border border-[#2A6552] rounded shadow-xl z-50 max-h-40 overflow-y-auto">
                  {Object.keys(safePlayerDict).map((name, i) => (
                    <li 
                      key={i} 
                      onClick={() => handleSelectPlayer(2, name)}
                      className="px-3 py-2 border-b border-[#2A6552] last:border-b-0 active:bg-[#2A6552] cursor-pointer text-sm"
                    >
                      {name} <span className="text-gray-400 ml-2">SL:{safePlayerDict[name]}</span>
                    </li>
                  ))}
                </ul>
              )}
            </div>

            <div className="flex items-center mb-4">
              <label className="w-24 text-lg">Skill level:</label>
              <input type="range" min="1" max="9" value={p2.sl} onChange={e => setP2({...p2, sl: parseInt(e.target.value)})} className="flex-1" />
              <span className="ml-4 w-6 h-6 rounded-full bg-pink-600 flex items-center justify-center font-bold text-sm border border-white">{p2.sl}</span>
            </div>
            <div className="flex items-center">
              <label className="w-24 text-lg">Race to:</label>
              <div className="flex-1 bg-[#1D5C45] border border-gray-500 rounded px-2 py-1 text-gray-200">
                {SL_GOALS[p2.sl]}
              </div>
            </div>
          </div>

          <button 
            onClick={() => onStart(p1, p2)}
            className="mt-auto mb-10 w-full bg-[#1A6E4F] border border-white py-4 rounded-xl text-xl font-bold flex items-center justify-center gap-4 active:scale-95 transition-transform shadow-lg"
          >
            Start game!
          </button>
        </div>
      );
    };

    // ==========================================
    // メイン試合画面
    // ==========================================
    const MatchScreen = ({ p1Setup, p2Setup, onBack, onSaveMatch }) => {
      const getInitialState = () => ({
        p1: { name: p1Setup.name, sl: p1Setup.sl, goal: SL_GOALS[p1Setup.sl], score: 0 },
        p2: { name: p2Setup.name, sl: p2Setup.sl, goal: SL_GOALS[p2Setup.sl], score: 0 },
        activePlayer: null,
        rackWinner: null,
        isBreakSelection: true,
        rack: 1,
        inning: 1,
        deadCount: 0,
        tableBalls: [1, 2, 3, 4, 5, 6, 7, 8, 9],
        timeline: [{ inning: 1, p1: [], p2: [] }],
        isNextRackPrompt: false,
        isGameOver: false,
        winner: null,
        lastAction: null,
        startTime: Date.now(),
        endTime: null
      });

      const [history, setHistory] = useState([getInitialState()]);
      const currentState = history[history.length - 1];
      const timelineRef = useRef(null);
      
      const [showExitWarning, setShowExitWarning] = useState(false);

      useEffect(() => {
        if (timelineRef.current) {
          timelineRef.current.scrollTop = timelineRef.current.scrollHeight;
        }
      }, [currentState.timeline]);

      const pushState = (newState) => {
        setHistory(prev => [...prev, newState]);
      };

      const cloneState = () => JSON.parse(JSON.stringify(currentState));

      const handleSelectBreaker = (playerNum) => {
        if (!currentState.isBreakSelection) return;
        const next = cloneState();
        next.activePlayer = playerNum;
        next.isBreakSelection = false;
        
        const pKey = playerNum === 1 ? 'p1' : 'p2';
        next.timeline[0][pKey].push({ type: 'break' });

        next.lastAction = { type: 'set_breaker' };
        pushState(next);
      };

      const handleBallTap = (num) => {
        if (currentState.isNextRackPrompt || currentState.isBreakSelection || currentState.isGameOver || !currentState.tableBalls.includes(num)) return;

        const next = cloneState();
        const pts = num === 9 ? 2 : 1;
        const pKey = next.activePlayer === 1 ? 'p1' : 'p2';

        next[pKey].score += pts;
        next.tableBalls = next.tableBalls.filter(b => b !== num);

        const currentInning = next.timeline.find(t => t.inning === next.inning);
        currentInning[pKey].push({ type: 'pot', ball: num });

        next.lastAction = { type: 'pot', ball: num, player: next.activePlayer, points: pts };

        if (num === 9) {
          next.isNextRackPrompt = true;
          next.rackWinner = next.activePlayer;
        }

        pushState(next);
      };

      const handleDeadAction = () => {
        const la = currentState.lastAction;
        if (!la || la.type !== 'pot' || currentState.isGameOver) return;

        const next = cloneState();
        const pKey = la.player === 1 ? 'p1' : 'p2';

        next[pKey].score -= la.points;
        next.deadCount += 1;

        const currentInning = next.timeline.find(t => t.inning === next.inning);
        const lastEvent = currentInning[pKey][currentInning[pKey].length - 1];
        if (lastEvent && lastEvent.type === 'pot' && lastEvent.ball === la.ball) {
          lastEvent.type = 'dead';
        }

        next.lastAction = { type: 'dead', ball: la.ball, player: la.player };
        next.isGameOver = false; 

        pushState(next);
      };

      const handleSwitchAction = () => {
        if (currentState.isNextRackPrompt || currentState.isBreakSelection || currentState.isGameOver) return;
        const next = cloneState();
        const pKey = next.activePlayer === 1 ? 'p1' : 'p2';

        const currentInning = next.timeline.find(t => t.inning === next.inning);
        currentInning[pKey].push({ type: 'switch' });

        if (next.activePlayer === 1) {
          next.activePlayer = 2;
        } else {
          next.activePlayer = 1;
          next.inning += 1;
          next.timeline.push({ inning: next.inning, p1: [], p2: [] });
        }

        next.lastAction = { type: 'switch' };
        pushState(next);
      };

      const handleFinishAction = () => {
        const next = cloneState();
        next.isGameOver = true;
        next.endTime = Date.now();
        next.winner = next.p1.score >= next.p1.goal ? 1 : 2;
        pushState(next);
      };

      const handleSafetyAction = () => {
        if (currentState.isNextRackPrompt || currentState.isBreakSelection || currentState.isGameOver) return;
        const next = cloneState();
        const pKey = next.activePlayer === 1 ? 'p1' : 'p2';

        const currentInning = next.timeline.find(t => t.inning === next.inning);
        currentInning[pKey].push({ type: 'safety' });

        if (next.activePlayer === 1) {
          next.activePlayer = 2;
        } else {
          next.activePlayer = 1;
          next.inning += 1;
          next.timeline.push({ inning: next.inning, p1: [], p2: [] });
        }

        next.lastAction = { type: 'safety' };
        pushState(next);
      };

      const handleNextRack = () => {
        const next = cloneState();
        next.isNextRackPrompt = false;
        next.rack += 1;
        next.tableBalls = [1, 2, 3, 4, 5, 6, 7, 8, 9];
        
        next.activePlayer = next.rackWinner;
        const pKey = next.activePlayer === 1 ? 'p1' : 'p2';
        const currentInning = next.timeline.find(t => t.inning === next.inning);
        currentInning[pKey].push({ type: 'break' });

        next.lastAction = { type: 'next_rack' };
        pushState(next);
      };

      const handleUndo = () => {
        if (history.length > 1) {
          setHistory(prev => prev.slice(0, -1));
        }
      };

      const { p1, p2, activePlayer, rack, inning, deadCount, tableBalls, timeline, isNextRackPrompt, isBreakSelection, isGameOver, winner, lastAction, startTime, endTime } = currentState;
      const canUndo = history.length > 1 && !isGameOver;
      const canDead = lastAction && lastAction.type === 'pot' && !isGameOver;
      
      const isGoalReached = p1.score >= p1.goal || p2.score >= p2.goal;

      const p1Stats = computeStats(timeline, 'p1');
      const p2Stats = computeStats(timeline, 'p2');
      
      let p1TeamPts = 0, p2TeamPts = 0;
      if (isGameOver) {
        const loserPlayer = winner === 1 ? p2 : p1;
        const pts = getTeamPoints(loserPlayer.sl, loserPlayer.score);
        p1TeamPts = winner === 1 ? pts.winner : pts.loser;
        p2TeamPts = winner === 2 ? pts.winner : pts.loser;
      }

      const handleSave = async () => {
        const matchData = {
          startTime,
          endTime,
          p1: { name: p1.name, sl: p1.sl, score: p1.score, goal: p1.goal },
          p2: { name: p2.name, sl: p2.sl, score: p2.score, goal: p2.goal },
          winner,
          p1TeamPts,
          p2TeamPts,
          inning,
          timeline,
          p1Stats,
          p2Stats
        };
        const saved = await onSaveMatch(matchData, p1, p2);
        if (saved) {
          alert('試合結果を保存しました。');
          onBack();
        } else {
          alert('保存に失敗しました。');
        }
      };

      const StatRow = ({ label, v1, v2 }) => (
        <div className="flex justify-between items-center text-sm py-[6px]">
          <span className="w-12 text-center font-bold text-gray-800">{v1}</span>
          <span className="flex-1 text-center text-gray-500 font-medium">{label}</span>
          <span className="w-12 text-center font-bold text-gray-800">{v2}</span>
        </div>
      );

      const renderTimelineActions = (actions) => actions.map((action, idx) => (
        <React.Fragment key={idx}>
          {action.type === 'break' && <span className="text-white text-xs font-bold mx-1">B</span>}
          {action.type === 'pot' && <MiniBall num={action.ball} />}
          {action.type === 'dead' && <MiniBall num={action.ball} isDead={true} />}
          {action.type === 'safety' && <span className="text-white text-xs font-bold mx-1">S</span>}
        </React.Fragment>
      ));

      return (
        <div className="flex flex-col h-screen max-w-md mx-auto bg-[#0F4C3A] shadow-xl relative overflow-hidden">
          
          {showExitWarning && (
            <div className="absolute inset-0 z-50 bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm">
              <div className="bg-white text-gray-800 rounded-2xl w-full p-6 shadow-2xl relative text-center">
                <p className="text-lg font-bold mb-2">確認</p>
                <p className="text-sm text-gray-600 mb-6">進行途中の試合データは失われます。<br/>退出しますか？</p>
                <div className="flex justify-around">
                  <button onClick={() => setShowExitWarning(false)} className="text-blue-500 font-medium px-4 py-2">キャンセル</button>
                  <button onClick={onBack} className="text-pink-500 font-medium px-4 py-2">退出する</button>
                </div>
              </div>
            </div>
          )}

          {isBreakSelection && (
            <div className="absolute inset-0 z-40 bg-black/40 flex flex-col items-center justify-end pb-32">
              <p className="text-2xl font-bold text-white mb-8 animate-bounce">↑ 先攻プレイヤーを選択</p>
            </div>
          )}

          {isNextRackPrompt && !isGoalReached && !isGameOver && (
            <div className="absolute inset-0 z-40 flex items-center justify-center pointer-events-none">
              <button onClick={handleNextRack} className="pointer-events-auto bg-green-700/90 backdrop-blur text-white px-8 py-5 rounded-2xl text-2xl font-bold shadow-[0_0_20px_rgba(0,0,0,0.5)] border-2 border-white animate-pulse">
                次のラックへ
              </button>
            </div>
          )}

          {isGameOver && (
            <div className="absolute inset-0 z-50 bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm">
              <div className="bg-white text-gray-800 rounded-3xl w-full p-6 shadow-2xl relative">
                <div className="flex justify-between text-xs text-gray-400 mb-2 px-2">
                  <span>{formatDate(endTime || startTime)}</span>
                  <span>{formatTime(startTime)}-{endTime ? formatTime(endTime) : ''}</span>
                </div>
                
                <div className="flex justify-between items-center mb-2">
                  <div className="text-center flex-1">
                    <p className={`text-xl font-bold ${winner === 1 ? 'text-pink-500' : 'text-gray-500'}`}>{winner === 1 ? 'Win!' : 'Lose..'}</p>
                    <p className="text-sm text-gray-600 mt-1">{p1.name} (SL:{p1.sl})</p>
                    <p className="mt-1">
                      <span className="text-5xl font-normal text-gray-800">{p1.score}</span>
                      <span className="text-lg text-gray-500 font-medium">/{p1.goal}</span>
                    </p>
                  </div>
                  <div className="text-center flex-1">
                    <p className={`text-xl font-bold ${winner === 2 ? 'text-pink-500' : 'text-gray-500'}`}>{winner === 2 ? 'Win!' : 'Lose..'}</p>
                    <p className="text-sm text-gray-600 mt-1">{p2.name} (SL:{p2.sl})</p>
                    <p className="mt-1">
                      <span className="text-5xl font-normal text-gray-800">{p2.score}</span>
                      <span className="text-lg text-gray-500 font-medium">/{p2.goal}</span>
                    </p>
                  </div>
                </div>
                
                <p className="text-center text-lg font-medium text-gray-800">チーム得点: {p1TeamPts}-{p2TeamPts}</p>
                <p className="text-center text-sm font-medium text-gray-500 mb-4">イニング : {inning}</p>
                
                <div className="border-t border-gray-200 py-3 space-y-1">
                  <StatRow label="セーフティー" v1={p1Stats.safeties} v2={p2Stats.safeties} />
                  <StatRow label="シュート精度" v1={`${p1Stats.accuracy}%`} v2={`${p2Stats.accuracy}%`} />
                  <StatRow label="ブレイク回数" v1={p1Stats.breaks} v2={p2Stats.breaks} />
                  <StatRow label="最大連続得点" v1={p1Stats.maxRun} v2={p2Stats.maxRun} />
                </div>
                
                <div className="flex justify-around mt-4 pt-2">
                  <button onClick={handleSave} className="text-blue-500 font-medium text-lg px-8 py-2">保存</button>
                  <button onClick={handleUndo} className="text-pink-500 font-medium text-lg px-8 py-2">cancel</button>
                </div>
              </div>
            </div>
          )}

          <header className="flex justify-between items-center p-3 border-b border-[#2A6552]">
            <button className="text-xl px-2" onClick={() => setShowExitWarning(true)}>&lt;</button>
            <h1 className="text-md font-semibold">JPA match!</h1>
            <span className="text-xs text-gray-300">開始時刻 : {formatTime(startTime)}</span>
          </header>

          <div className="flex h-28 border-b border-[#2A6552]">
            <div 
              onClick={() => handleSelectBreaker(1)}
              className={`flex-1 flex flex-col justify-center items-center relative transition-colors ${activePlayer === 1 ? 'bg-[#1D634C]' : ''} ${isBreakSelection ? 'cursor-pointer hover:bg-[#1A5A44] z-50' : ''}`}
            >
              <div className="absolute top-2 left-2 text-sm">{p1.name}</div>
              <div className="absolute top-7 left-2 text-sm text-gray-300">SL: {p1.sl} <span className="ml-2">Goal: {p1.goal}</span></div>
              <span className="text-5xl mt-6">{p1.score}</span>
              {p1.goal - p1.score <= 5 && p1.goal - p1.score > 0 && <span className="text-yellow-400 text-xs mt-1 absolute bottom-1">{p1.goal - p1.score} more!</span>}
            </div>

            <div 
              onClick={() => handleSelectBreaker(2)}
              className={`flex-1 flex flex-col justify-center items-center relative transition-colors ${activePlayer === 2 ? 'bg-[#1D634C]' : ''} ${isBreakSelection ? 'cursor-pointer hover:bg-[#1A5A44] z-50' : ''}`}
            >
               <div className="absolute top-2 left-2 text-sm">{p2.name}</div>
              <div className="absolute top-7 left-2 text-sm text-gray-300">SL: {p2.sl} <span className="ml-2">Goal: {p2.goal}</span></div>
              <span className="text-5xl mt-6">{p2.score}</span>
              {p2.goal - p2.score <= 5 && p2.goal - p2.score > 0 && <span className="text-yellow-400 text-xs mt-1 absolute bottom-1">{p2.goal - p2.score} more!</span>}
            </div>
          </div>

          <div className="flex justify-between px-6 py-1 border-b border-[#2A6552] text-sm">
            <span>Rack: {rack}</span>
            <span>Inning: {inning}</span>
            <span>Dead: {deadCount}</span>
          </div>

          <div className="flex-1 overflow-y-auto p-2" ref={timelineRef}>
            <div className="space-y-0 text-sm pb-4">
              {timeline.map((inn, idx) => (
                <div key={idx} className="flex relative items-center py-2 border-b border-[#1D5C45] min-h-[40px]">
                  <div className="absolute w-full h-[1px] bg-[#1D5C45] top-1/2 transform -translate-y-1/2 z-0"></div>
                  
                  <div className="flex-1 flex flex-wrap gap-1 pr-4 justify-end z-10 items-center">
                    {renderTimelineActions(inn.p1)}
                  </div>

                  <div className="w-6 flex justify-center z-10 bg-[#0F4C3A]">
                    <span className="text-xs">{inn.inning}</span>
                  </div>

                  <div className="flex-1 flex flex-wrap gap-1 pl-4 justify-start z-10 items-center">
                    {renderTimelineActions(inn.p2)}
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div className="bg-[#0B3A2C] pt-4 pb-8 rounded-t-2xl shadow-[0_-4px_10px_rgba(0,0,0,0.3)] z-30">
            <div className="flex flex-wrap justify-center gap-2 mb-6 px-4">
              {[1, 2, 3, 4, 5, 6, 7, 8, 9].map((num) => {
                const isAvailable = tableBalls.includes(num);
                return (
                  <button
                    key={num}
                    onClick={() => handleBallTap(num)}
                    disabled={!isAvailable || isNextRackPrompt || isBreakSelection || isGameOver}
                    className={`w-12 h-12 rounded-full flex items-center justify-center text-xl font-bold transition-all shadow-md
                      ${isAvailable ? getBallColor(num) : 'bg-gray-800 opacity-20 shadow-none'}
                      ${(isNextRackPrompt || isBreakSelection || isGameOver) ? 'cursor-not-allowed' : 'active:scale-95'}
                    `}
                  >
                    {num}
                  </button>
                );
              })}
            </div>
            <div className="flex justify-around px-2 text-xs font-medium">
              <button onClick={handleDeadAction} disabled={!canDead} className={`flex flex-col items-center gap-1 transition-opacity ${canDead ? 'text-white opacity-100' : 'text-gray-500 opacity-50'}`}>
                <div className={`w-10 h-10 border-2 rounded-full flex items-center justify-center ${canDead ? 'border-white' : 'border-gray-500'}`}><span className="text-lg">×</span></div><span>dead</span>
              </button>
              
              <button onClick={handleSafetyAction} disabled={isBreakSelection || isGameOver} className={`flex flex-col items-center gap-1 ${(isBreakSelection || isGameOver) ? 'opacity-50' : 'active:opacity-70'}`}>
                <div className="w-10 h-10 border-2 border-white rounded-full flex items-center justify-center"><span className="text-lg">S</span></div><span>safety</span>
              </button>
              
              {isGoalReached ? (
                <button onClick={handleFinishAction} className="flex flex-col items-center gap-1 active:opacity-70 text-pink-500">
                  <div className="w-10 h-10 border-2 border-pink-500 rounded-full flex items-center justify-center">
                    <span className="text-[12px] font-bold">Fin</span>
                  </div>
                  <span>finish</span>
                </button>
              ) : (
                <button onClick={handleSwitchAction} disabled={isBreakSelection || isGameOver} className={`flex flex-col items-center gap-1 ${(isBreakSelection || isGameOver) ? 'opacity-50' : 'active:opacity-70 text-yellow-300'}`}>
                  <div className={`w-10 h-10 border-2 rounded-full flex items-center justify-center ${(isBreakSelection || isGameOver) ? 'border-gray-500' : 'border-yellow-300'}`}><span className="text-lg">⇄</span></div><span>switch</span>
                </button>
              )}

              <button onClick={handleUndo} disabled={!canUndo} className={`flex flex-col items-center gap-1 ${canUndo ? 'text-white opacity-100 active:opacity-70' : 'text-gray-500 opacity-50'}`}>
                <div className={`w-10 h-10 border-2 rounded-full flex items-center justify-center ${canUndo ? 'border-white' : 'border-gray-500'}`}><span className="text-lg">↶</span></div><span>undo</span>
              </button>
            </div>
          </div>
        </div>
      );
    }

    const App = () => {
      const [view, setView] = useState('HOME');
      const [p1Setup, setP1Setup] = useState(null);
      const [p2Setup, setP2Setup] = useState(null);
      const [loggedInUser, setLoggedInUser] = useState('');
      const [userData, setUserData] = useState(EMPTY_USER_DATA);
      const [isLoadingSession, setIsLoadingSession] = useState(true);

      const clearSession = () => {
        setLoggedInUser('');
        setUserData(EMPTY_USER_DATA);
      };

      useEffect(() => {
        const restoreSession = async () => {
          try {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
              const name = session.user.user_metadata?.display_name || '';
              setLoggedInUser(name);
              const { data: dbData } = await _supabase
                .from('user_data')
                .select('match_history, player_dict')
                .eq('id', session.user.id)
                .single();
              setUserData({
                matchHistory: dbData?.match_history || [],
                playerDict: dbData?.player_dict || {}
              });
            }
          } catch (_error) {
            clearSession();
          } finally {
            setIsLoadingSession(false);
          }
        };
        restoreSession();
      }, []);

      const handleAuthSuccess = ({ name, data }) => {
        setLoggedInUser(name || '');
        setUserData(data || EMPTY_USER_DATA);
      };

      const handleLogout = async () => {
        clearSession();
        await _supabase.auth.signOut();
      };

      const saveUserData = async (nextData) => {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) return false;
        try {
          const { error } = await _supabase
            .from('user_data')
            .upsert({
              id: session.user.id,
              match_history: nextData.matchHistory,
              player_dict: nextData.playerDict,
              updated_at: new Date().toISOString()
            });
          if (error) throw error;
          setUserData(nextData);
          return true;
        } catch (_error) {
          return false;
        }
      };

      const handleSaveMatch = async (matchData, p1, p2) => {
        const nextData = {
          matchHistory: [...(userData.matchHistory || []), matchData],
          playerDict: {
            ...(userData.playerDict || {}),
            [p1.name]: p1.sl,
            [p2.name]: p2.sl
          }
        };
        return saveUserData(nextData);
      };

      const handleDeleteMatch = async (startTime) => {
        const nextData = {
          matchHistory: (userData.matchHistory || []).filter(m => m.startTime !== startTime),
          playerDict: userData.playerDict || {}
        };
        return saveUserData(nextData);
      };

      const handleStartMatch = (p1, p2) => {
        setP1Setup(p1);
        setP2Setup(p2);
        setView('MATCH');
      };

      const handleBackToSetup = () => {
        setView('HOME');
      };

      if (isLoadingSession) return null;

      return (
        <>
          {view === 'HOME' && <HomeScreen onNewMatch={() => setView('SETUP')} onViewMatchData={() => setView('HISTORY')} onViewPersonalData={() => setView('PERSONAL_DATA')} loggedInUser={loggedInUser} onAuthSuccess={handleAuthSuccess} onLogout={handleLogout} />}
          {view === 'SETUP' && <SetupScreen onStart={handleStartMatch} onBack={() => setView('HOME')} playerDict={userData.playerDict || {}} />}
          {view === 'MATCH' && <MatchScreen p1Setup={p1Setup} p2Setup={p2Setup} onBack={handleBackToSetup} onSaveMatch={handleSaveMatch} />}
          {view === 'HISTORY' && <HistoryScreen onBack={() => setView('HOME')} loggedInUser={loggedInUser} matchHistory={userData.matchHistory || []} onDeleteMatch={handleDeleteMatch} />}
          {view === 'PERSONAL_DATA' && <PersonalDataScreen onBack={() => setView('HOME')} loggedInUser={loggedInUser} matchHistory={userData.matchHistory || []} />}
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    if (!isSupabaseConfigured) {
      root.render(
        <div className="flex flex-col items-center justify-center h-screen bg-[#0F4C3A] text-white text-center p-8">
          <p className="text-5xl mb-4">⚠️</p>
          <h2 className="text-xl font-bold mb-4">Supabase の設定が必要です</h2>
          <p className="text-sm text-gray-300 leading-relaxed">
            jpa-score.html の <strong>SUPABASE_URL</strong> と <strong>SUPABASE_ANON_KEY</strong> を<br />
            実際のプロジェクトの値に置き換えてください。
          </p>
          <p className="text-xs text-gray-400 mt-4">詳しくは supabase-setup.sql のコメントを参照してください。</p>
        </div>
      );
    } else {
      root.render(<App />);
    }
  </script>
</body>
</html>
